<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Piedra, Papel o Tijeras</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }

        .container {
            background: #3a3a3a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        h1 {
            margin-bottom: 30px;
        }

        input[type="image"] {
            width: 120px;
            height: 120px;
            margin: 10px;
            border-radius: 20px;
            border: 3px solid #555;
            object-fit: cover;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        input[type="image"]:hover {
            transform: translateY(-4px) scale(1.05);
            border-color: #888;
        }

        input[type="image"]:active {
            transform: scale(0.95);
        }

        .resultado {
            margin-top: 25px;
            font-size: 18px;
        }

        #contador {
            font-size: 20px;
            margin-bottom: 20px;
            display: block;
        }
    </style>

    <script>

        let puntosJugador = 0;
        let puntosCPU = 0;

        function jugar(eleccionJugador) {

            const opciones = ["Piedra", "Papel", "Tijeras"];
            const eleccionCPU = opciones[Math.floor(Math.random() * 3)];

            let resultado = "";

            if (eleccionJugador === eleccionCPU) {
                resultado = "Empate";
            }
            else if (
                (eleccionJugador === "Piedra" && eleccionCPU === "Tijeras") ||
                (eleccionJugador === "Papel" && eleccionCPU === "Piedra") ||
                (eleccionJugador === "Tijeras" && eleccionCPU === "Papel")
            ) {
                resultado = "¡Has ganado!";
                puntosJugador++;
            }
            else {
                resultado = "Has perdido";
                puntosCPU++;
            }

            document.getElementById("resultado").innerHTML =
                "Tú: " + eleccionJugador +
                "<br>CPU: " + eleccionCPU +
                "<br><br>" + resultado;

            document.getElementById("contador").innerHTML =
                "Tú " + puntosJugador + " - " + puntosCPU + " CPU";
        }

    </script>

</head>

<body>

    <div class="container">

        <h1>Piedra, Papel o Tijeras</h1>

        <span id="contador">Tú 0 - 0 CPU</span>

        <input type="image" src="Piedra.png" alt="Piedra" onclick="jugar('Piedra')">
        <input type="image" src="Papel.png" alt="Papel" onclick="jugar('Papel')">
        <input type="image" src="Tijeras.png" alt="Tijeras" onclick="jugar('Tijeras')">

        <div id="resultado" class="resultado"></div>

    </div>

</body>

</html>
